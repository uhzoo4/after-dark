  <title>The Weeknd — After Dark</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --void:    #080808;
  --wine:    #1a0505;
  --crimson: #8b0000;
  --blood:   #c0392b;
  --ash:     #e8e0d8;
  --silver:  #a09898;
  --fd: 'Cormorant Garamond', Georgia, serif;
  --fm: 'DM Mono', monospace;
}

html { scroll-behavior: auto; }

body {
  background: var(--void);
  color: var(--ash);
  font-family: var(--fm);
  overflow-x: hidden;
  cursor: none;
}

/* ── Cursor ── */
.cur { position:fixed; width:6px; height:6px; background:var(--crimson); border-radius:50%; pointer-events:none; z-index:9999; transform:translate(-50%,-50%); transition:transform .1s; }
.cur-r { position:fixed; width:28px; height:28px; border:1px solid rgba(139,0,0,.35); border-radius:50%; pointer-events:none; z-index:9998; transform:translate(-50%,-50%); transition:width .3s,height .3s,border-color .3s; }
body:has(a:hover) .cur-r,
body:has(button:hover) .cur-r { width:44px; height:44px; border-color:rgba(139,0,0,.7); }

/* ── Grain ── */
body::before {
  content:''; position:fixed; inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:256px; opacity:.035; pointer-events:none; z-index:9000;
}

/* ── Nav ── */
.nav {
  position:fixed; top:0; left:0; right:0; height:64px; z-index:800;
  display:flex; align-items:center; justify-content:space-between; padding:0 60px;
  transition:background .3s,border-color .3s; border-bottom:1px solid transparent;
}
.nav.scrolled { background:rgba(8,8,8,.88); backdrop-filter:blur(14px); border-bottom-color:rgba(255,255,255,.04); }
.nav__back { font-family:var(--fm); font-size:.72rem; letter-spacing:.18em; text-transform:uppercase; color:var(--silver); text-decoration:none; transition:color .2s; }
.nav__back:hover { color:var(--ash); }
.nav__home { font-family:var(--fd); font-size:1rem; font-style:italic; font-weight:300; color:var(--ash); opacity:.6; }

/* ── HERO ── */
.hero {
  position:relative; height:100vh;
  display:flex; align-items:center; justify-content:center;
  overflow:hidden; text-align:center;
}

#bg-canvas {
  position:absolute; inset:0; z-index:0; opacity:.55;
}

.hero__glow {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:800px; height:800px;
  background:radial-gradient(circle, rgba(139,0,0,.14) 0%, transparent 65%);
  pointer-events:none; z-index:1;
  animation:glowBreathe 6s ease-in-out infinite;
}

.hero__content { position:relative; z-index:2; }

.hero__eyebrow {
  font-family:var(--fm); font-size:.65rem; letter-spacing:.3em;
  text-transform:uppercase; color:var(--crimson); margin-bottom:20px;
  opacity:0; animation:fadeUp .8s ease .4s forwards;
}

.hero__name {
  font-family:var(--fd); font-weight:300; font-style:italic;
  font-size:clamp(5rem,14vw,12rem); line-height:.88;
  color:var(--ash); margin-bottom:28px;
  opacity:0; animation:fadeUp 1.1s ease .7s forwards;
}

.hero__name em { color:var(--crimson); font-style:italic; }

.hero__sub {
  font-family:var(--fm); font-size:.78rem; color:var(--silver);
  letter-spacing:.06em; margin-bottom:48px;
  opacity:0; animation:fadeUp .8s ease 1.1s forwards;
}

.hero__scroll {
  position:absolute; bottom:40px; left:50%; transform:translateX(-50%); z-index:2;
  display:flex; flex-direction:column; align-items:center; gap:8px;
  opacity:0; animation:fadeIn 1s ease 2.2s forwards;
}
.hero__scroll-line { width:1px; height:50px; background:linear-gradient(to bottom,transparent,var(--crimson)); animation:scrollPulse 2.2s ease-in-out infinite; }
.hero__scroll-txt { font-size:.58rem; letter-spacing:.22em; text-transform:uppercase; color:var(--silver); opacity:.45; }

/* ── ARCHIVE SECTION ── */
.archive {
  position:relative;
  /* tall enough for all 6 vinyls × scroll space per vinyl */
  height:700vh;
}

.archive__sticky {
  position:sticky; top:0; height:100vh; overflow:hidden;
  display:flex; align-items:center; justify-content:center;
}

/* Depth layer — atmospheric behind vinyls */
.depth-layer {
  position:absolute; inset:0; pointer-events:none; z-index:1;
}

.depth-vinyl {
  position:absolute;
  border-radius:50%;
  opacity:0;
  pointer-events:none;
  transform-origin:center center;
}

/* Foreground vinyl stage */
.vinyl-stage {
  position:absolute; inset:0; z-index:2;
  display:flex; align-items:center; justify-content:center;
  pointer-events:none;
}

/* Each vinyl panel — invisible by default, GSAP controls */
.vinyl-panel {
  position:absolute;
  width:420px; height:420px;
  opacity:0; pointer-events:none;
}

.vinyl-disc {
  width:100%; height:100%; border-radius:50%;
  position:relative; overflow:hidden;
  background:radial-gradient(circle at 35% 35%, #1c1c1c, #050505);
  box-shadow: 0 0 0 1px rgba(255,255,255,.05), 0 30px 80px rgba(0,0,0,.8);
  animation:spinSlow 12s linear infinite;
}

/* Groove rings */
.vinyl-disc::before {
  content:'';
  position:absolute; inset:0; border-radius:50%;
  background:
    radial-gradient(circle at center, transparent 28%, rgba(255,255,255,.015) 28.5%, transparent 29%),
    radial-gradient(circle at center, transparent 42%, rgba(255,255,255,.012) 42.5%, transparent 43%),
    radial-gradient(circle at center, transparent 57%, rgba(255,255,255,.01) 57.5%, transparent 58%),
    radial-gradient(circle at center, transparent 72%, rgba(255,255,255,.008) 72.5%, transparent 73%);
}

/* Center label */
.vinyl-disc::after {
  content:'';
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:28%; height:28%;
  border-radius:50%;
  background:var(--label-color, #8b0000);
  box-shadow:inset 0 0 20px rgba(0,0,0,.5);
}

/* Hole */
.vinyl-hole {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:4%; height:4%;
  border-radius:50%; background:var(--void); z-index:2;
}

/* Vinyl info — shows during dwell */
.vinyl-info {
  position:absolute; left:50%; bottom:-80px; transform:translateX(-50%);
  text-align:center; white-space:nowrap; opacity:0;
}
.vinyl-info__label { font-family:var(--fm); font-size:.6rem; letter-spacing:.25em; text-transform:uppercase; color:var(--crimson); margin-bottom:6px; }
.vinyl-info__title { font-family:var(--fd); font-size:1.6rem; font-weight:300; font-style:italic; color:var(--ash); }
.vinyl-info__year { font-family:var(--fm); font-size:.68rem; color:var(--silver); opacity:.5; margin-top:4px; }

/* Click hint */
.vinyl-hint {
  position:absolute; right:-120px; top:50%; transform:translateY(-50%);
  font-family:var(--fm); font-size:.6rem; letter-spacing:.15em;
  text-transform:uppercase; color:var(--silver); opacity:0;
  writing-mode:vertical-rl;
}

/* ── VINYL WRAPPER — clip container for physical paper extraction ── */
.vinyl-wrapper {
  position: relative;
  width: 420px;
  height: 420px;
  overflow: visible;
}

/* ── PAPER SHEET — lives INSIDE .vinyl-panel, right of disc ── */
.paper-sheet {
  position: absolute;
  top: 50%;
  left: 420px;
  transform: translateY(-50%) translateX(-400px);
  width: 380px;
  height: 500px;
  background: linear-gradient(160deg, #100606 0%, #0a0808 60%, #080808 100%);
  border-left: 1px solid rgba(139,0,0,.2);
  border-top: 1px solid rgba(255,255,255,.04);
  border-bottom: 1px solid rgba(255,255,255,.03);
  border-right: 1px solid rgba(255,255,255,.03);
  padding: 44px 40px 40px;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  overflow-x: hidden;
  box-shadow:
    -20px 0 60px rgba(0,0,0,.7),
    -4px 0 20px rgba(139,0,0,.08),
    inset 1px 0 0 rgba(139,0,0,.06);
  pointer-events: none;
  opacity: 0;
  z-index: 10;
}

.paper-sheet::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(to right, var(--crimson), transparent);
  opacity: .4;
  flex-shrink: 0;
}

.sheet__close {
  position: absolute; top: 16px; right: 20px;
  font-family:var(--fm); font-size:.65rem; letter-spacing:.15em;
  text-transform:uppercase; color:var(--silver); background:none; border:none; cursor:pointer;
  transition:color .2s; z-index:10;
}
.sheet__close:hover { color:var(--ash); }

.sheet__eyebrow { font-family:var(--fm); font-size:.58rem; letter-spacing:.28em; text-transform:uppercase; color:var(--crimson); margin-bottom:12px; opacity:0; flex-shrink:0; }
.sheet__title { font-family:var(--fd); font-size:clamp(1.4rem,2.2vw,2rem); font-weight:300; font-style:italic; line-height:1.05; color:var(--ash); margin-bottom:4px; opacity:0; flex-shrink:0; }
.sheet__year { font-family:var(--fm); font-size:.68rem; color:var(--silver); opacity:0; margin-bottom:28px; flex-shrink:0; }

.sheet__tracks { display:flex; flex-direction:column; }

.sheet__track {
  display:grid; grid-template-columns:32px 1fr 36px;
  align-items:center; padding:11px 0;
  border-bottom:1px solid rgba(255,255,255,.03);
  opacity:0; transform:translateX(16px);
  transition:background .15s;
  border-radius:2px; cursor:pointer;
}
.sheet__track:hover { background:rgba(255,255,255,.02); }
.sheet__track.playing { background:rgba(139,0,0,.1); }

.sheet__track-num { font-size:.65rem; color:var(--silver); opacity:.3; }
.sheet__track-name { font-family:var(--fm); font-size:.82rem; color:var(--ash); }
.sheet__track-btn {
  width:26px; height:26px; border-radius:50%;
  border:1px solid rgba(255,255,255,.08); background:none;
  display:flex; align-items:center; justify-content:center;
  font-size:.55rem; color:var(--silver); cursor:pointer;
  transition:border-color .2s,background .2s,color .2s;
}
.sheet__track-btn:hover, .sheet__track.playing .sheet__track-btn {
  border-color:var(--crimson); background:var(--crimson); color:var(--ash);
}

.sheet__spotify {
  display:inline-flex; align-items:center; gap:10px;
  margin-top:28px; padding:11px 24px;
  border:1px solid #1DB954; color:var(--ash);
  font-family:var(--fm); font-size:.72rem; letter-spacing:.1em;
  text-transform:uppercase; text-decoration:none;
  transition:background .2s,color .2s; align-self:flex-start; opacity:0;
}
.sheet__spotify:hover { background:#1DB954; color:#000; }

/* ── CSS STATE MACHINE: EXTRACTION PHYSICS ── */

.vinyl-panel {
  transition: transform 0.55s cubic-bezier(0.4,0,1,1) 0.15s !important;
}

.vinyl-panel.is-extracted {
  pointer-events:all;
  transform: translateX(-20vw) scale(1.10) !important;
  transition: transform 0.85s cubic-bezier(0.16,1,0.3,1) 0s !important;
}

.paper-sheet {
  transition:
    transform .5s cubic-bezier(0.4,0,1,1) .1s,
    opacity .4s ease-in .1s;
}

.vinyl-panel.is-extracted .paper-sheet {
  pointer-events:all;
  opacity:1;
  transform:translateY(-50%) translateX(0);

  transition:
    transform .65s cubic-bezier(0.16,1,0.3,1) .25s,
    opacity .5s ease .25s;
}

.vinyl-info,
.vinyl-hint {
  transition: opacity .3s ease;
}

.vinyl-panel.is-extracted .vinyl-info,
.vinyl-panel.is-extracted .vinyl-hint {
  opacity:0 !important;
}

.sheet__close,
.sheet__eyebrow,
.sheet__title,
.sheet__year,
.sheet__spotify {
  transform:translateX(-15px);
  transition:
    transform .25s cubic-bezier(0.4,0,1,1),
    opacity .2s ease-in;
}

.sheet__track {
  transition:
    transform .25s cubic-bezier(0.4,0,1,1),
    opacity .2s ease-in,
    background .15s;
}

.vinyl-panel.is-extracted .sheet__close,
.vinyl-panel.is-extracted .sheet__eyebrow,
.vinyl-panel.is-extracted .sheet__title,
.vinyl-panel.is-extracted .sheet__year {
  opacity:1;
  transform:translateX(0);
  transition:
    transform .7s cubic-bezier(0.16,1,0.3,1),
    opacity .7s ease-out;
}

.vinyl-panel.is-extracted .sheet__close { transition-delay:.45s; }
.vinyl-panel.is-extracted .sheet__eyebrow { transition-delay:.5s; }
.vinyl-panel.is-extracted .sheet__title { transition-delay:.55s; }
.vinyl-panel.is-extracted .sheet__year { transition-delay:.6s; }

.vinyl-panel.is-extracted .sheet__spotify {
  opacity:1;
  transform:translateX(0);
  transition:
    transform .7s cubic-bezier(0.16,1,0.3,1) 1.1s,
    opacity .7s ease-out 1.1s;
}

.vinyl-panel.is-extracted .sheet__track {
  opacity:1;
  transform:translateX(0);
  transition:
    transform .7s cubic-bezier(0.16,1,0.3,1),
    opacity .7s ease-out,
    background .15s;
}

/* ── KEYFRAMES ── */
@keyframes fadeUp { from{opacity:0;transform:translateY(32px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn { to{opacity:1} }
@keyframes glowBreathe { 0%,100%{opacity:1;transform:translate(-50%,-50%) scale(1)} 50%{opacity:.5;transform:translate(-50%,-50%) scale(1.08)} }
@keyframes scrollPulse { 0%,100%{transform:scaleY(1);opacity:1} 50%{transform:scaleY(.55);opacity:.3} }
@keyframes spinSlow { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
</style>
</head>

// ─────────────────────────────────────────────
// CURSOR
// ─────────────────────────────────────────────
const curEl = document.getElementById('cur')
const curR  = document.getElementById('curR')
let mx=0,my=0,rx=0,ry=0
document.addEventListener('mousemove',e=>{ mx=e.clientX; my=e.clientY; curEl.style.left=mx+'px'; curEl.style.top=my+'px' })
;(function animR(){ rx+=(mx-rx)*.12; ry+=(my-ry)*.12; curR.style.left=rx+'px'; curR.style.top=ry+'px'; requestAnimationFrame(animR) })()

// ─────────────────────────────────────────────
// BG CANVAS — faded vinyl moon
// ─────────────────────────────────────────────
function initBgVinyl() {
  const canvas   = document.getElementById('bg-canvas')
  const scene    = new THREE.Scene()
  const camera   = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 100)
  const renderer = new THREE.WebGLRenderer({ canvas, alpha:true, antialias:true })
  renderer.setSize(innerWidth, innerHeight)
  renderer.setPixelRatio(Math.min(devicePixelRatio,1.5))
  camera.position.z = 3.5

  // Large faded vinyl disc
  const geo = new THREE.CylinderGeometry(2.2, 2.2, 0.04, 128)
  const mat = new THREE.MeshStandardMaterial({ color:0x0d0d0d, roughness:.4, metalness:.6, transparent:true, opacity:.7 })
  const disc = new THREE.Mesh(geo, mat)
  disc.rotation.x = Math.PI * 0.08
  scene.add(disc)

  // Label
  const lGeo = new THREE.CylinderGeometry(.62,.62,.045,64)
  const lMat = new THREE.MeshStandardMaterial({ color:0x3d0000, roughness:.6 })
  const label = new THREE.Mesh(lGeo,lMat)
  label.position.y = .002
  scene.add(label)

  // Lights
  const kl = new THREE.PointLight(0x8b0000,2,12)
  kl.position.set(4,4,4)
  scene.add(kl)
  scene.add(new THREE.AmbientLight(0x0a0a0a,3))

  window.addEventListener('resize',()=>{
    camera.aspect=innerWidth/innerHeight
    camera.updateProjectionMatrix()
    renderer.setSize(innerWidth,innerHeight)
  })

  let last=0
  function tick(t){
    requestAnimationFrame(tick)
    const d=Math.min((t-last)/1000,.05); last=t
    disc.rotation.y  += .0025*(d*60)
    label.rotation.y += .0025*(d*60)
    renderer.render(scene,camera)
  }
  tick(0)
}

// ─────────────────────────────────────────────
// BUILD VINYL PANELS
// ─────────────────────────────────────────────
// Depth resting positions for retreated vinyls
const DEPTH_POSITIONS = [
  { left:'-8%',  top:'15%',  size:120 },
  { left:'82%',  top:'10%',  size:100 },
  { left:'75%',  top:'65%',  size:130 },
  { left:'-5%',  top:'60%',  size:110 },
  { left:'40%',  top:'5%',   size:90  },
  { left:'35%',  top:'78%',  size:95  },
]

const panels    = []
const depthEls  = []

function buildPanels() {
  const stage = document.getElementById('vinylStage')
  const depth = document.getElementById('depthLayer')

  ALBUMS.forEach((album, i) => {
    // Foreground panel — now has a wrapper + attached paper sheet
    const panel = document.createElement('div')
    panel.className = 'vinyl-panel'
    panel.id = `vp-${i}`
    panel.innerHTML = `
      <div class="vinyl-wrapper">
        <div class="vinyl-disc" style="--label-color:${album.labelColor}">
          <div class="vinyl-hole"></div>
        </div>
        <div class="paper-sheet" id="ps-${i}">
          <button class="sheet__close" data-idx="${i}">✕</button>
          <p class="sheet__eyebrow">The Weeknd · ${album.year}</p>
          <h2 class="sheet__title">${album.title}</h2>
          <p class="sheet__year">${album.year}</p>
          <div class="sheet__tracks">
            ${album.tracks.map((t,ti) => `
              <div class="sheet__track" data-url="${t.url}">
                <span class="sheet__track-num">${String(ti+1).padStart(2,'0')}</span>
                <span class="sheet__track-name">${t.name}</span>
                <button class="sheet__track-btn" aria-label="Open in Spotify">↗</button>
              </div>
            `).join('')}
          </div>
          <a href="${album.spotifyUrl}" target="_blank" rel="noopener" class="sheet__spotify">
            Open in Spotify ↗
          </a>
        </div>
      </div>
      <div class="vinyl-info">
        <p class="vinyl-info__label">0${i+1} · The Weeknd</p>
        <p class="vinyl-info__title">${album.title}</p>
        <p class="vinyl-info__year">${album.year}</p>
      </div>
      <p class="vinyl-hint">Click to open</p>
    `

    // Wire close button
    panel.querySelector('.sheet__close').addEventListener('click', e => {
      e.stopPropagation()
      closeSheet(i)
    })

    // Wire Spotify track buttons
    panel.querySelectorAll('.sheet__track-btn').forEach((btn, ti) => {
      btn.addEventListener('click', e => {
        e.stopPropagation()
        const url = btn.closest('.sheet__track').dataset.url
        window.open(url, '_blank')
      })
    })

    // Click vinyl disc = open sheet
    panel.querySelector('.vinyl-disc').addEventListener('click', () => openSheet(i))

    stage.appendChild(panel)
    panels.push(panel)

    // Depth ghost
    const dp = DEPTH_POSITIONS[i]
    const ghost = document.createElement('div')
    ghost.className = 'depth-vinyl'
    ghost.id = `dv-${i}`
    ghost.style.cssText = `
      width:${dp.size}px; height:${dp.size}px;
      left:${dp.left}; top:${dp.top};
      border-radius:50%;
      background:radial-gradient(circle at 35% 35%, #141414, #030303);
      box-shadow:0 0 0 1px rgba(255,255,255,.03);
    `
    ghost.innerHTML = `<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:28%;height:28%;border-radius:50%;background:${album.labelColor};opacity:.7"></div>`
    depth.appendChild(ghost)
    depthEls.push(ghost)
  })
}

// ─────────────────────────────────────────────
// GSAP SCROLL SYSTEM
// ─────────────────────────────────────────────
function initScroll() {
  gsap.registerPlugin(ScrollTrigger)

  const archive = document.getElementById('archive')

  ALBUMS.forEach((album, i) => {
    const panel = panels[i]
    const ghost = depthEls[i]
    const info  = panel.querySelector('.vinyl-info')
    const hint  = panel.querySelector('.vinyl-hint')

    // Scroll window per album: each gets 1/6 of the archive height
    // Using trigger offsets
    const start = `top+=${i * (100/6)}%`
    const mid   = `top+=${(i + 0.4) * (100/6)}%`
    const end   = `top+=${(i + 0.85) * (100/6)}%`

    // ENTER — vinyl emerges
    gsap.timeline({
      scrollTrigger: {
        trigger: archive,
        start: `top+=${i * (100/6)}% top`,
        end:   `top+=${(i+0.45) * (100/6)}% top`,
        scrub: .8,
      }
    })
    .fromTo(panel,
      { opacity:0, scale:.4, y:80, rotateZ:-8, pointerEvents:'none' },
      { opacity:1, scale:1,  y:0,  rotateZ:0,  pointerEvents:'all',  ease:'none' }
    )
    .fromTo(info,
      { opacity:0, y:20 },
      { opacity:1, y:0 },
      '<.4'
    )
    .fromTo(hint,
      { opacity:0 },
      { opacity:.5 },
      '<.2'
    )

    // RETREAT — vinyl moves to depth when next album arrives
    gsap.timeline({
      scrollTrigger: {
        trigger: archive,
        start: `top+=${(i+0.52) * (100/6)}% top`,
        end:   `top+=${(i+1.0) * (100/6)}% top`,
        scrub: 1,
      }
    })
    .to(panel,
      { opacity:0, scale:.18, pointerEvents:'none', ease:'power2.in' }
    )
    .to(info,   { opacity:0 }, '<')
    .to(hint,   { opacity:0 }, '<')
    // Ghost in depth layer fades in
    .fromTo(ghost,
      { opacity:0, scale:.6 },
      { opacity:.35, scale:1 },
      '<.3'
    )
  })

  // Nav scroll class
  window.addEventListener('scroll', () => {
    document.getElementById('nav').classList.toggle('scrolled', scrollY > 60)
  }, { passive:true })
}

// ─────────────────────────────────────────────
// JS STATE MACHINE — Physical Extraction
// ─────────────────────────────────────────────

let activeIdx = -1;
let sheetOpen = false;

function openSheet(idx) {
  if (sheetOpen) return;

  sheetOpen = true;
  activeIdx = idx;

  const panel = panels[idx];
  const tracks = panel.querySelectorAll('.sheet__track');

  // stagger delays
  tracks.forEach((track, i) => {
    track.style.transitionDelay = `${0.65 + (i * 0.04)}s`;
  });

  // lock scroll
  document.body.style.overflow = 'hidden';

  // reflow
  void panel.offsetHeight;

  requestAnimationFrame(() => {
    panel.classList.add('is-extracted');
  });
}

function closeSheet(idx) {
  if (!sheetOpen || activeIdx !== idx) return;

  const panel = panels[idx];
  const tracks = panel.querySelectorAll('.sheet__track');

  // fast exits
  tracks.forEach(track => {
    track.style.transitionDelay = '0s';
  });

  panel.classList.remove('is-extracted');

  setTimeout(() => {
    sheetOpen = false;
    activeIdx = -1;
    document.body.style.overflow = '';
  }, 800);
}

// ESC closes active sheet
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && sheetOpen) {
    closeSheet(activeIdx);
  }
});

// Escape key closes active sheet
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && sheetOpen) closeSheet(activeIdx)
})

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  initBgVinyl()
  buildPanels()
  initScroll()
})
</script>
